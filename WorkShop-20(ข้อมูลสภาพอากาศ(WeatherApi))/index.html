<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Api</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <h1>Weather Api</h1>
            <form action="" id="form">
                <input type="text" placeholder="search city name" id="search">
                <button type="submit">Search</button>
            </form>
        </header>
        <section>
            <div id="location">
                <h1 id="city">Bangkok</h1>
                <p id="state">TH</p>
            </div>
            <div id="card">
                <div id="weather">
                    <h1></h1>
                    <small></small>
                </div>
                <div id="info">
                    <div id="status"></div>
                    <div id="humidity"></div>
                    <div id="wind"></div>
                </div>
            </div>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
