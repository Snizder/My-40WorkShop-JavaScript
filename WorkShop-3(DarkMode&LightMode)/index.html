<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark & LightMode</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://kit.fontawesome.com/28a3682ef4.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="theme-switch-container">
        <span id="toggle-icon">
            <span class="toggle-text">โหมดกลางวัน</span>
            <i class="fa-regular fa-sun"></i>
            <!-- <i class="fa-solid fa-moon"></i> -->
        </span>
        <label class="theme-switch">
            <input type="checkbox">
            <div class="slider round">

            </div>
        </label>
    </div>
    <nav id="nav">
        <a href="#home">หน้าแรก</a>
        <a href="#project">โปรเจ็ค</a>
        <a href="#contact">ช่องทางการติดต่อ</a>
    </nav>
    <section id="home">
        <div class="title-group"></div>
        <h1>Patcharapong</h1>
        <h2>ฝึกเขียนโปรแกรม</h2>
    </section>
    <section id="project">
        <h1>ผลงานด้านต่างๆ</h1>
        <div class="project-container">
            <div class="image-container">
                <h2>พัฒนาเว็บไซต์ต่างๆ</h2>
                <img src="./img/undraw_completed_light.svg" alt="" id="img-1">
            </div>
            <div class="image-container">
                <h2>Mobile responesive</h2>
                <img src="./img/undraw_data-table_light.svg" alt="" id="img-2">
            </div>
            <div class="image-container">
                <h2>ฟรีแลนด์</h2>
                <img src="./img/undraw_ai-research-assistant_light.svg" alt="" id="img-3">
            </div>
        </div>
    </section>
    <section id="contact">
        <div class="social-icon">
            <i class="fa-solid fa-envelope"></i>
            <i class="fa-brands fa-line"></i>
            <i class="fa-brands fa-github"></i>
        </div>
    </section>
</body>
<script src="style.js"></script>
</html>
