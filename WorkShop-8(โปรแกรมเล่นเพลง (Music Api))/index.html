<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมเล่นเพลง</title>
    <script src="https://kit.fontawesome.com/28a3682ef4.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1 style="color: #fff;">โปรแกรมเล่นเพลง (Music Api)</h1>

    <div class="music-container" id="music-container">
        <div class="music-info">
            <h4 class="title" id="title"> เพลงมาริโอ้</h4>
            <div class="progress-container" id="progress-container">
                <div class="progress" id="progress"></div>
            </div>
        </div>

        <audio src="" controls hidden id="audio"></audio>

        <div class="img-container">
            <img src="" alt="" id="cover">
        </div>

        <div class="navigation">
            <button id="prev" class="action-btn">
                <i class="fa-solid fa-angle-left"></i>
            </button>
            <button id="play" class="action-btn">
                <i class="fa-solid fa-play"></i>
            </button>
            <button id="next" class="action-btn">
                <i class="fa-solid fa-angle-right"></i>
            </button>
        </div>

    </div>
    <script src="style.js"></script>
</body>
</html>
