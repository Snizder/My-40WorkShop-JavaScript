<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประเมิณความพึงพอใจ(Emoji)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="panel" class="container">
        <strong>คุณมีความพึงพอใจในบริการระดับใด</strong>
    <div class="rating-container">
        <div class="rating">
            <img src="./Images/sad.svg" alt="">
            <small>ไม่พอใจ</small>
        </div>
        <div class="rating">
            <img src="./Images/neutral.svg" alt="">
            <small>พอใจ</small>
        </div>
        <div class="rating">
            <img src="./Images/smile.svg" alt="">
            <small>พอใจมาก</small>
        </div>
    </div>
    <button class="btn" id="send">ส่งผลการประเมิณ</button>
</div>

    <script src="script.js"></script>
</body>
</html>
